<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login page</title>
  <link href="./logIn.css" rel="stylesheet" />
</head>

<body>
  <section id="main-section">
    <div class="card">

      <form class="login">
          <div>
            <img src="./Assets/icons/user.png" alt="User" class="icon" />
            <input type="email" placeholder="User name / Email" />
          </div>
          <div>
            <img src="./Assets/icons/padlock (1).png" alt="lock" class="icon" />
            <input id="blue-border" type="password" placeholder="Password" />
          </div>
          <button type="submit">
            <span>LOGIN NOW</span>
            <img src="./Assets/icons/chevron.png" alt="Chevron" />
          </button>
      </form>

      <div class="socials">
        <h3>log in via</h3>
        <div class="social-icons">
          <img src="./Assets/icons/instagram (1).png" alt="Instagram" />
          <img src="./Assets/icons/facebook (1).png" alt="Facebook" />
          <img src="./Assets/icons/twitter (1).png" alt="Twitter" />
        </div>
      </div>
      <div class="card-background">
        <span class="card-background-span card-background-1"></span>
        <span class="card-background-span card-background-2"></span>
        <span class="card-background-span card-background-3"></span>
        <span class="card-background-span card-background-4"></span>
      </div>
      </div>
  </section>
</body>

</html>
